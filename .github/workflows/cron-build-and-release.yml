name: cron-build-and-release

on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Build the pinned VS Code version (from upstream/stable.json) regardless of whether upstream has advanced'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: cron-build-and-release
  cancel-in-progress: false

jobs:
  check:
    name: Check for new VS Code release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      needs_build: ${{ steps.compare.outputs.needs_build }}
      ms_tag: ${{ steps.compare.outputs.ms_tag }}
      ms_commit: ${{ steps.compare.outputs.ms_commit }}
      release_version: ${{ steps.compare.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read current pin
        id: current
        run: |
          tag=$(jq -r '.tag' upstream/stable.json)
          commit=$(jq -r '.commit' upstream/stable.json)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Query upstream VS Code latest stable
        id: upstream
        run: |
          for attempt in 1 2 3; do
            if curl -sf 'https://update.code.visualstudio.com/api/update/darwin/stable/0000000000000000000000000000000000000000' -o /tmp/update.json; then
              break
            fi
            echo "Attempt $attempt failed, retrying in 60s..." >&2
            sleep 60
          done
          if [[ ! -s /tmp/update.json ]]; then
            echo "Failed to fetch VS Code update info after 3 attempts" >&2
            exit 1
          fi
          ms_tag=$(jq -r '.name' /tmp/update.json)
          ms_commit=$(jq -r '.version' /tmp/update.json)
          echo "ms_tag=$ms_tag" >> "$GITHUB_OUTPUT"
          echo "ms_commit=$ms_commit" >> "$GITHUB_OUTPUT"

      - name: Compare and decide
        id: compare
        env:
          CURRENT_TAG: ${{ steps.current.outputs.tag }}
          CURRENT_COMMIT: ${{ steps.current.outputs.commit }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.ms_tag }}
          UPSTREAM_COMMIT: ${{ steps.upstream.outputs.ms_commit }}
          FORCE_BUILD: ${{ inputs.force_build }}
        run: |
          # force_build: build the *pinned* version regardless of upstream changes.
          #   Used to verify the workflow against a known-good pin, or to rebuild
          #   after pushing a workflow/script fix without bumping VS Code.
          # Cron (force_build=false): build only if upstream advanced past the pin.
          if [[ "$FORCE_BUILD" == "true" ]]; then
            ms_tag="$CURRENT_TAG"
            ms_commit="$CURRENT_COMMIT"
            needs_build=true
            reason="force_build=true; using pinned $ms_tag"
          elif [[ "$UPSTREAM_TAG" != "$CURRENT_TAG" ]]; then
            ms_tag="$UPSTREAM_TAG"
            ms_commit="$UPSTREAM_COMMIT"
            needs_build=true
            reason="upstream advanced from $CURRENT_TAG to $ms_tag"
          else
            ms_tag="$CURRENT_TAG"
            ms_commit="$CURRENT_COMMIT"
            needs_build=false
            reason="upstream tag $UPSTREAM_TAG matches pin; skipping"
          fi

          time_patch=$(printf "%04d" $(($(date +%-j) * 24 + $(date +%-H))))
          release_version="${ms_tag}${time_patch}"

          echo "needs_build=$needs_build" >> "$GITHUB_OUTPUT"
          echo "ms_tag=$ms_tag" >> "$GITHUB_OUTPUT"
          echo "ms_commit=$ms_commit" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "::notice::$reason (release_version=$release_version)"

  build:
    name: Build BradfordCode (macOS arm64)
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    runs-on: macos-15
    timeout-minutes: 120
    env:
      APP_NAME: BradfordCode
      OS_NAME: osx
      VSCODE_ARCH: arm64
      VSCODE_QUALITY: stable
      SHOULD_BUILD: "yes"
      SHOULD_BUILD_REH: "no"
      SHOULD_BUILD_REH_WEB: "no"
      SHOULD_BUILD_CLI: "no"
      SHOULD_BUILD_ZIP: "no"
      SHOULD_BUILD_DMG: "yes"
      CI_BUILD: "yes"
      DISABLE_UPDATE: "no"
      MS_TAG: ${{ needs.check.outputs.ms_tag }}
      MS_COMMIT: ${{ needs.check.outputs.ms_commit }}
      RELEASE_VERSION: ${{ needs.check.outputs.release_version }}
      CERTIFICATE_OSX_P12_DATA: ${{ secrets.CERTIFICATE_OSX_P12_DATA }}
      CERTIFICATE_OSX_P12_PASSWORD: ${{ secrets.CERTIFICATE_OSX_P12_PASSWORD }}
      CERTIFICATE_OSX_ID: ${{ secrets.CERTIFICATE_OSX_ID }}
      CERTIFICATE_OSX_APP_PASSWORD: ${{ secrets.CERTIFICATE_OSX_APP_PASSWORD }}
      CERTIFICATE_OSX_TEAM_ID: ${{ secrets.CERTIFICATE_OSX_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache npm packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-${{ env.MS_COMMIT }}
          restore-keys: |
            npm-

      - name: Pin upstream VS Code (in-job, not committed)
        run: |
          jq --arg tag "$MS_TAG" --arg commit "$MS_COMMIT" \
            '.tag = $tag | .commit = $commit' \
            upstream/stable.json > /tmp/stable.json
          mv /tmp/stable.json upstream/stable.json
          cat upstream/stable.json

      - name: Clone VS Code source
        run: ./get_repo.sh

      - name: Build BradfordCode.app
        run: ./build.sh

      - name: Sign + notarize + DMG
        run: ./prepare_assets.sh

      - name: Compute DMG SHA-256
        id: hash
        run: |
          sha256_file="assets/BradfordCode.arm64.${RELEASE_VERSION}.dmg.sha256"
          if [[ ! -f "$sha256_file" ]]; then
            echo "Expected SHA-256 sidecar not found: $sha256_file" >&2
            ls -la assets/ >&2
            exit 1
          fi
          sha256=$(awk '{print $1}' "$sha256_file")
          echo "dmg_sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "::notice::DMG SHA-256 = $sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dmg
          path: assets/BradfordCode.arm64.${{ env.RELEASE_VERSION }}.dmg
          retention-days: 90
          if-no-files-found: error

      - name: Upload SHA-256 sidecar artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dmg-sha256
          path: assets/BradfordCode.arm64.${{ env.RELEASE_VERSION }}.dmg.sha256
          retention-days: 90
          if-no-files-found: error

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-logs
          path: |
            *.log
            vscode/.build/extensions/*.failed
          retention-days: 30
          if-no-files-found: ignore
    outputs:
      dmg_sha256: ${{ steps.hash.outputs.dmg_sha256 }}

  release:
    name: Publish release + update versions pin
    needs: [check, build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MS_TAG: ${{ needs.check.outputs.ms_tag }}
      MS_COMMIT: ${{ needs.check.outputs.ms_commit }}
      RELEASE_VERSION: ${{ needs.check.outputs.release_version }}
      DMG_SHA256: ${{ needs.build.outputs.dmg_sha256 }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download DMG
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dmg
          path: assets/

      - name: Download SHA-256 sidecar
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dmg-sha256
          path: assets/

      - name: Sanity-check downloaded artifacts
        run: |
          dmg="assets/BradfordCode.arm64.${RELEASE_VERSION}.dmg"
          sha="assets/BradfordCode.arm64.${RELEASE_VERSION}.dmg.sha256"
          test -f "$dmg" || { echo "Missing $dmg" >&2; exit 1; }
          test -f "$sha" || { echo "Missing $sha" >&2; exit 1; }
          echo "DMG size: $(stat -c%s "$dmg") bytes"
          echo "DMG SHA-256: ${DMG_SHA256}"

      - name: Update upstream/stable.json
        run: |
          jq --arg tag "$MS_TAG" --arg commit "$MS_COMMIT" \
            '.tag = $tag | .commit = $commit' \
            upstream/stable.json > /tmp/stable.json
          mv /tmp/stable.json upstream/stable.json

      - name: Write versions/stable/darwin-arm64/latest.json
        run: |
          mkdir -p versions/stable/darwin-arm64
          timestamp_ms=$(($(date +%s) * 1000 + $(date +%N) / 1000000))
          jq -n \
            --arg url "https://github.com/bradford-tech/code/releases/download/${RELEASE_VERSION}/BradfordCode.arm64.${RELEASE_VERSION}.dmg" \
            --arg name "$RELEASE_VERSION" \
            --arg version "$MS_COMMIT" \
            --arg productVersion "$MS_TAG" \
            --arg hash "$DMG_SHA256" \
            --argjson timestamp "$timestamp_ms" \
            '{url: $url, name: $name, version: $version, productVersion: $productVersion, hash: $hash, timestamp: $timestamp, supportsFastUpdate: true}' \
            > versions/stable/darwin-arm64/latest.json
          cat versions/stable/darwin-arm64/latest.json

      - name: Commit & push the new pin + version JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream/stable.json versions/stable/darwin-arm64/latest.json
          git commit -m "chore(release): ${RELEASE_VERSION} (vscode ${MS_TAG})"

          # Push with rebase-and-retry to handle concurrent pushes to main during the long build window.
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase failed on attempt ${attempt}" >&2
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}"
              break
            fi
            if [[ ${attempt} -eq 3 ]]; then
              echo "Push failed after 3 attempts" >&2
              exit 1
            fi
            echo "Push failed on attempt ${attempt}; retrying after 10s" >&2
            sleep 10
          done

      - name: Create GitHub Release
        run: |
          notes_file=$(mktemp)
          cat > "$notes_file" <<EOF
          ## BradfordCode ${RELEASE_VERSION}

          This release tracks **Microsoft VS Code ${MS_TAG}**.

          For upstream changes, see [microsoft/vscode releases](https://github.com/microsoft/vscode/releases/tag/${MS_TAG}).

          ### BradfordCode-specific properties

          - macOS arm64 only (Apple Silicon).
          - Signed by \`Developer ID Application: Bradford Technologies Group LLC (7AKC2YS2N2)\` and notarized by Apple.
          - Telemetry endpoints disabled at build time.
          - Extension marketplace points at [Open VSX](https://open-vsx.org); the bundled GitHub Copilot extension is removed.
          - GitHub sign-in uses a Personal Access Token instead of OAuth.

          ### Verification

          - DMG SHA-256: \`${DMG_SHA256}\`
          - Bundle identifier: \`tech.bradford.code\`
          - Notarization: \`spctl --assess --verbose /Applications/BradfordCode.app\` should return \`accepted, source=Notarized Developer ID\`.
          EOF

          # Idempotent: if a previous run partially created this release, delete it before recreating.
          gh release delete "${RELEASE_VERSION}" --yes 2>/dev/null || true

          gh release create "${RELEASE_VERSION}" \
            --title "BradfordCode ${RELEASE_VERSION}" \
            --notes-file "$notes_file" \
            "assets/BradfordCode.arm64.${RELEASE_VERSION}.dmg" \
            "assets/BradfordCode.arm64.${RELEASE_VERSION}.dmg.sha256"

  report-failure:
    name: Open issue on failure
    needs: [check, build, release]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MS_TAG: ${{ needs.check.outputs.ms_tag }}
        with:
          script: |
            const msTag = process.env.MS_TAG || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const titleStem = `Build failure: vscode ${msTag}`;

            // Look for an existing open issue for this VS Code tag
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'build-failure',
              per_page: 100,
            });
            const existing = issues.find(i => i.title.startsWith(titleStem));

            const commentBody = [
              `Build failure on workflow run [${context.runId}](${runUrl}).`,
              ``,
              `- Triggered by: \`${context.eventName}\``,
              `- VS Code tag: \`${msTag}\``,
              `- Run started: ${new Date().toISOString()}`,
              ``,
              `See the run for full logs.`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: commentBody,
              });
              core.notice(`Commented on existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titleStem} (run ${context.runId})`,
                body: commentBody,
                labels: ['build-failure'],
              });
              core.notice(`Opened issue #${created.number}`);
            }
